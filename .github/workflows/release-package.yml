name: Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build everything but skip the publish step"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build main + per-service + shard wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install "poetry-core>=2.0" "poetry>=2.0" build hatchling twine

      # pip, not poetry, for reasons in ci-tests-mkdocs-deployment.yml
      # (poetry's resolver chokes on unpublished sub-package pins in
      # [project.optional-dependencies]).
      - name: Install project + release tooling
        run: pip install -e '.[generator]'

      - name: Verify generated blocks in pyproject.toml are in sync
        run: python -m scripts.release.sync_extras --check

      - name: Verify docs/packaging.md is in sync
        run: python -m scripts.release.sync_packaging_docs --check

      - name: Build main wheel
        run: python -m build --wheel --outdir dist

      - name: Build per-service + shard wheels
        run: python -m scripts.release.build_subpackages --outdir dist

      - name: Verify wheel contents
        run: python -m scripts.release.verify_wheels dist/

      - name: Install smoke test
        run: python -m scripts.release.smoke_test dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # PyPI caps new-project registrations at ~20/hour. The first release
    # creates ~410 new project names so the uploader sleeps 65 min
    # between chunks; worst case ~22 hours end-to-end. Subsequent
    # releases only bump versions on existing projects and finish in
    # minutes.
    timeout-minutes: 1440
    if: github.event_name == 'release' && !inputs.dry-run
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Publish wheels in rate-limited chunks
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m scripts.release.publish_wheels dist/
