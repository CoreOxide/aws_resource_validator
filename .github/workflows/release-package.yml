name: Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build everything but skip the publish step"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build main + per-service + shard wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install "poetry>=2.0" build hatchling

      - name: Install project (for sync_extras + smoke_test)
        run: poetry install --no-interaction --no-root --with dev

      - name: Verify generated blocks in pyproject.toml are in sync
        run: poetry run python -m scripts.release.sync_extras --check

      - name: Verify docs/packaging.md is in sync
        run: poetry run python -m scripts.release.sync_packaging_docs --check

      - name: Build main wheel
        run: poetry build -f wheel

      - name: Build per-service + shard wheels
        run: poetry run python -m scripts.release.build_subpackages --outdir dist

      - name: Verify wheel contents
        run: poetry run python -m scripts.release.verify_wheels dist/

      - name: Install smoke test
        run: poetry run python -m scripts.release.smoke_test dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && !inputs.dry-run
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
