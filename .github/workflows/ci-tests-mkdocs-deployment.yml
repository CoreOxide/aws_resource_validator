name: CI Tests, Linter, and MkDocs Deployment

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # pip, not poetry, because poetry's resolver eagerly resolves every
      # ``[project.optional-dependencies]`` entry at install time — and the
      # per-service sub-packages pinned there may not exist at the version
      # we're preparing. pip only resolves extras you actually request.
      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[generator]'
          pip install ruff mypy pytest pytest-xdist pytest-cov responses "boto3-stubs[all]"

      - name: Ruff
        run: ruff check aws_resource_validator tests

      - name: Mypy
        run: mypy aws_resource_validator/core aws_resource_validator/generator

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[generator]'
          pip install pytest pytest-xdist pytest-cov responses "boto3-stubs[all]"

      - name: Unit and integration tests
        run: pytest tests/unit tests/integration

      - name: Generated model tests
        run: pytest tests/generated -n auto

  mkdocs-deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs_render_swagger_plugin mkdocs-awesome-pages-plugin

      - name: Build and deploy
        run: |
          mkdocs build
          mkdocs gh-deploy --force
