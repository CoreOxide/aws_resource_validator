    "aws-resource-validator-cognito-idp==2.0.2",
]
dynamodb = [
    "aws-resource-validator-dynamodb==2.0.2",
]
ec2 = [
    "aws-resource-validator-ec2==2.0.2",
]
ecs = [
    "aws-resource-validator-ecs==2.0.2",
]
