    "aws-resource-validator-ai==2.0.2",
    "aws-resource-validator-compute==2.0.2",
    "aws-resource-validator-data==2.0.2",
    "aws-resource-validator-integration==2.0.2",
    "aws-resource-validator-management==2.0.2",
