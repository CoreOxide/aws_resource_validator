[[tool.poetry.source]]
name = "PyPI"
priority = "primary"

# ---------------------------------------------------------------------------
# Core package metadata (PEP 621).
#
# Uses [project] + [project.optional-dependencies] instead of the older
# [tool.poetry.dependencies] + [tool.poetry.extras] shape so that
# poetry-core 2.x emits ``Provides-Extra`` / ``Requires-Dist`` entries
# referencing the sibling ``aws-resource-validator-<svc>`` wheels.
# ---------------------------------------------------------------------------
[project]
name = "aws-resource-validator"
version = "2.0.2"
description = "Validate, get validation patterns and generate valid AWS resource names, plus Pydantic v2 models mirroring the boto3 typed-dicts for every AWS service."
authors = [
    { name = "Alexy Grabov", email = "alexy.grabov@gmail.com" },
    { name = "Yafit Tupman", email = "ytupman@gmail.com" },
]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "exrex",
    "pydantic (>=2.13.3,<3.0)",
    "botocore",
]

[project.scripts]
arv-generate = "aws_resource_validator.generator.__main__:main"

[tool.poetry]
# PEP 621 [project] above owns name / version / description / authors /
# dependencies. This table only carries Poetry-specific tuning that PEP
# 621 doesn't express: what to include in the wheel, and what to
# exclude. Requires Poetry 2.0+ (CI uses 2.2+; local dev likewise).
packages = [{ include = "aws_resource_validator" }]
exclude = ["aws_resource_validator/pydantic_models/**"]

[tool.poetry.group.dev.dependencies]
# Generator deps, pulled in for local development so ``arv-generate``
# works out of ``poetry install`` without needing to request the extra.
requests = "*"
jinja2 = "*"
typer = "*"
black = "*"
boto3-stubs = { extras = ["all"], version = "*" }

# Test & lint.
pytest = "^9.0"
pytest-xdist = "*"
pytest-cov = "*"
responses = "*"
ruff = "*"
mypy = "*"

# Release tooling.
build = "*"
hatchling = "*"

# ---------------------------------------------------------------------------
# Extras
#
# [project.optional-dependencies] is generated by
# ``scripts/release/sync_extras.py`` from
# ``scripts/release/popular_services.txt`` + ``scripts/release/shards.toml``.
# Do not hand-edit between the BEGIN/END markers — run ``sync_extras.py
# --write`` instead. CI enforces synchronization via ``--check``.
# ---------------------------------------------------------------------------
# --- BEGIN GENERATED EXTRAS ---
[project.optional-dependencies]
generator = [
    "requests",
    "jinja2",
    "typer",
    "black",
]

# Individual services (popular — curated in popular_services.txt).
