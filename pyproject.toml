    "aws-resource-validator-rds==2.0.2",
]
redshift = [
    "aws-resource-validator-redshift==2.0.2",
]
route53 = [
    "aws-resource-validator-route53==2.0.2",
]
s3 = [
    "aws-resource-validator-s3==2.0.2",
]
sagemaker = [
    "aws-resource-validator-sagemaker==2.0.2",
