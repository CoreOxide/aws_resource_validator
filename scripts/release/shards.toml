# Domain shards for the per-service wheel family.
#
# Each AWS service directory under ``aws_resource_validator/pydantic_models/``
# must belong to exactly one shard. ``rest`` has ``catch_all = true`` —
# anything not explicitly listed elsewhere gets added to it by
# ``scripts/release/sync_extras.py``.
#
# Shards are metapackages: ``aws-resource-validator-<shard>`` ships an empty
# wheel that depends on every ``aws-resource-validator-<svc>`` for services
# in ``services``. Installing the shard transitively installs every service
# wheel in its domain.
#
# CI validation (sync_extras.py --check):
#   * No service appears in two shards.
#   * Every listed service exists under pydantic_models/.
#   * Exactly one shard has catch_all = true.

